<!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Fetch API Sandbox</title>
        <link rel="stylesheet" 
        href="<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB
        " crossorigin="anonymous">">
    </head>
    <body>
        <div class="container">
            <h1 class="display-4 mb-4">Fetch API Sandbox</h1>
            <div class="d-flex">
                <button class="btn btn-secondary mr-4" id="getText">Get Text</button>
                <button class="btn btn-success mr-4" id="getUsers">Get JSON</button>
                <button id="getPosts">Get API DATA</button>
            </div>
            <hr>
            <div id="output"></div>
            <form id="addPost">
                <div>
                    <input type="text" name="" id="title" placeholder="Title">
                </div>
                <div>
                    <textarea id="body" placeholder="Body"></textarea>
                </div>
                <input type="submit" value="Submit">
            </form>
        </div>

        <script>
            document.getElementById('getText').addEventListener
            ('click', getText);
            document.getElementById('getUsers').addEventListener
            ('click', getUsers);
            document.getElementById('getPosts').addEventListener
            ('click', getPosts);
            document.getElementById('addPost').addEventListener
            ('submit', getPosts);



        function getText(){
            //fetch('sample.txt')
            //.then(function(res){
            // return res.text();
            //})
        //.then(function(data){
            //console.log(data);
        //});

        fetch('sample.txt')
        .then((res) => res.text())
        .then((data) => {
            document.getElementById('output').innerHTML = data;
        })
        .catch((err) => console.log(err))
        }


        function getUsers(){
            fetch('user.json')
            .then((res) => res.json())
            .then((data) => {
                let output = '<h2>User</h2>';
                data.forEach(function(user){
                    output += `
                    <ul>
                        <li>Id: ${user.id}</li>
                        <li>Name: ${user.name}</li>
                        <li>Email: ${user.email}</li>
                    </ul>
                    `;
                });
            document.getElementById('output').innerHTML = output;  
            })
        }

        function getPosts(){
            fetch('https://jsonplaceholder.typicode.com/posts')
            .then((res) => res.json())
            .then((data) => {
                let output = '<h2>Posts</h2>';
                data.forEach(function(post){
                    output += `
                    <div>
                        <h3>${post.title}</h3>
                        <p>${post.body}</p>
                        </div>
                    
                    `;
                });
            document.getElementById('output').innerHTML = output;  
            })
        }

        function addPost(e){
            e.preventDefault();

            let title = document.getElementById('title').value;
            let body = document.getElementById('body').value;

            fetch('https://jsonplaceholder.typicode.com/posts', {
                method:'POST',
                headers: {
                    'Accept': 'application/json, text/plain, */*',
                    'Content-type':'application/json'
                },
                body:JSON.stringify({title:title, body:body})
            })
            .then((res) => res.json())
            .then((data) => console.log(data))
        }
        </script>
    </body>
    </html>
